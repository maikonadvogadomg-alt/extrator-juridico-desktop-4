name: Build Android APK — Iara Suite

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android SDK 34
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Capacitor
        run: npm install --no-save @capacitor/cli@6.1.2 @capacitor/core@6.1.2 @capacitor/android@6.1.2

      - name: Copiar assets web para Android
        run: npx cap copy android --inline

      - name: Permissão gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK Debug
        working-directory: android
        timeout-minutes: 35
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -Dorg.gradle.daemon=false"
          JAVA_TOOL_OPTIONS: "-Xmx3g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -300

      - name: Localizar APK gerado
        id: apk
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "file=$APK" >> $GITHUB_OUTPUT
          echo "APK encontrado: $APK"

      - name: Renomear APK
        if: steps.apk.outputs.file != ''
        run: |
          cp "${{ steps.apk.outputs.file }}" "iara-suite-v2.apk"

      - name: Deletar release anterior
        if: steps.apk.outputs.file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-apk --yes 2>/dev/null || true
          git push origin --delete latest-apk 2>/dev/null || true

      - name: Publicar APK como Release
        if: steps.apk.outputs.file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-apk \
            --title "✅ Iara Suite v2.0 — APK mais recente" \
            --notes "APK gerado automaticamente via GitHub Actions.

          **Como instalar:**
          1. Clique no arquivo \`iara-suite-v2.apk\` abaixo para baixar
          2. No celular: Configurações → Segurança → Fontes desconhecidas ✓
          3. Abra o .apk para instalar

          **Inclui:** Code Editor · Terminal Linux · APK Builder · Site Extractor" \
            --latest \
            "iara-suite-v2.apk"
