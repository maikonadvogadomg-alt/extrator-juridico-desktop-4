name: Build APK — Extrator Jurídico (Puro Android)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Sem Node.js, sem npm, sem Capacitor — Android puro
      - name: Permissão gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: android
        timeout-minutes: 25
        env:
          GRADLE_OPTS: "-Xmx3g -Dorg.gradle.daemon=false -Dfile.encoding=UTF-8"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Renomear APK
        run: |
          find android -name "*.apk" -exec cp {} extrator-juridico-v2.apk \;
          ls -lh extrator-juridico-v2.apk

      - name: Deletar release anterior
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-apk --yes 2>/dev/null || true

      - name: Publicar Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-apk \
            --title "✅ Extrator Jurídico v2.0 — APK Pronto" \
            --notes "**Extrator Jurídico — Maikon Caldeira OAB/MG 183712**

          ✅ Android puro (WebView) — sem Capacitor, sem Node.js

          **Como instalar:**
          1. Baixe o arquivo extrator-juridico-v2.apk abaixo
          2. Transfira para o celular (WhatsApp, Drive, cabo USB)
          3. Configurações → Segurança → Fontes desconhecidas ✓
          4. Abra o .apk → Instalar" \
            --latest \
            extrator-juridico-v2.apk
