plugins {
    id 'com.android.application'
}

android {
    namespace 'br.adv.maikoncaldeira.extrator'
    compileSdk 34

    defaultConfig {
        applicationId 'br.adv.maikoncaldeira.extrator'
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName '2.0.0'
    }

    buildTypes {
        debug {
            applicationIdSuffix ''
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        resources { excludes += ['META-INF/**'] }
    }
}

// SEM dependências externas — apenas Android puro
dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
